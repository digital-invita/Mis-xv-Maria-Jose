<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitación en proceso</title>

<style>

body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#8b1e2d,#3a0b13);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
}

.box{
  background: rgba(0,0,0,0.35);
  padding:40px;
  border-radius:15px;
  max-width:500px;
}

h1{
  margin-bottom:15px;
}

p{
  opacity:0.9;
  margin-bottom:25px;
}

.botones{
  display:flex;
  gap:15px;
  justify-content:center;
  flex-wrap:wrap;
}

.btn{
  padding:12px 22px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.btn-facebook{
  background:#1877f2;
  color:white;
}

.btn-whatsapp{
  background:#25D366;
  color:white;
}

.btn:hover{
  transform:scale(1.05);
}

</style>
</head>

<body>

<div class="box">

<h1>Invitación en proceso de activación</h1>

<p>
Esta invitación se encuentra en proceso de entrega.
Muy pronto estará disponible para compartir con los invitados.
</p>

<div class="botones">

<a class="btn btn-facebook" href="https://www.facebook.com/people/Digital-Invita/61587804296779" target="_blank">
Ver Facebook
</a>

<a class="btn btn-whatsapp" href="https://wa.me/5215550591264?text=Hola%20me%20interesa%20una%20invitación%20digital" target="_blank">
Quiero contratar invitación
</a>

</div>

</div>

</body>
</html>
